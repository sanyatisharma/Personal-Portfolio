<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanyati Sharma — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── Design Tokens ── */
  :root {
    --gold: #D4A037;
    --gold-light: #F5E6C4;
    --coral: #C75B3F;
    --charcoal: #1B1B2F;
    --slate: #2D2D44;
    --cream: #FDF8F2;
    --warm-gray: #A09B93;
    --light-gray: #E8E4DE;
    --white: #FFFFFF;
    --font-serif: 'DM Serif Display', Georgia, serif;
    --font-sans: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-sans);
    background: var(--cream);
    color: var(--charcoal);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Navigation ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.25rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .nav-logo {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--charcoal);
    text-decoration: none;
    letter-spacing: 0.05em;
  }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--charcoal);
    text-decoration: none;
  }
</style>
</head>
<body>
<nav>
  <a href="#" class="nav-logo">SANYATI.DEV</a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#experience">Experience</a></li>
    <li><a href="#projects">Work</a></li>
    <li><a href="#leadership">Leadership</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>
<!-- Sections coming soon -->
</body>
</html>
